name        = "GitHub Revenue"
version     = "1.0.0"
description = "For the hubbers!"
author      = "wes"

# ── Prerequisites ────────────────────────────────────────────
# Tools your team needs installed. The wizard checks each one and
# installs anything that's missing.

[[prerequisites]]
name            = "git"
display_name    = "Git"
description     = "Version control — tracks changes to your code so you can collaborate and roll back mistakes."
check_command   = "git --version"
install_command = "winget install --id Git.Git -e --source winget"
install_url     = "https://git-scm.com/downloads"
guidance        = "Download and run the installer. Accept the defaults — they work great."
required        = true

[[prerequisites]]
name            = "python"
display_name    = "Python"
description     = "A popular programming language used for scripting, data analysis, and automation."
check_command   = "python --version"
install_command = "winget install --id Python.Python.3.13 -e --source winget"
install_url     = "https://www.python.org/downloads/"
guidance        = "Download the installer and check 'Add Python to PATH' during setup."
required        = true

[[prerequisites]]
name            = "uv"
display_name    = "uv"
description     = "A fast Python package manager that works behind the scenes to install libraries quickly."
check_command   = "uv --version"
install_command = "powershell -ExecutionPolicy ByPass -c \"irm https://astral.sh/uv/install.ps1 | iex\""
install_url     = "https://docs.astral.sh/uv/getting-started/installation/"
guidance        = "Run the install command above in PowerShell, then restart your terminal."
required        = true

[[prerequisites]]
name            = "node"
display_name    = "Node.js"
description     = "A JavaScript runtime needed by many developer tools and MCP servers."
check_command   = "node --version"
install_command = "winget install --id OpenJS.NodeJS -e --source winget"
install_url     = "https://nodejs.org/"
guidance        = "Download the LTS version and run the installer. Accept the defaults."
required        = true

[[prerequisites]]
name            = "az"
display_name    = "Azure CLI"
description     = "A command-line tool for managing Azure cloud resources — used for sign-in and data access."
check_command   = "az --version"
install_command = "winget install --id Microsoft.AzureCLI -e --source winget"
install_url     = "https://learn.microsoft.com/en-us/cli/azure/install-azure-cli-windows"
guidance        = "Download and run the MSI installer from the link above."
required        = true

[[prerequisites]]
name            = "gh"
display_name    = "GitHub CLI"
description     = "A command-line tool for working with GitHub — pull requests, issues, and more from your terminal."
check_command   = "gh --version"
install_command = "winget install --id GitHub.cli -e --source winget"
install_url     = "https://cli.github.com/"
guidance        = "Download and run the installer from the link above."
required        = true

[[prerequisites]]
name            = "dotnet"
display_name    = ".NET SDK"
description     = "Microsoft's development platform — needed for some tools and MCP servers."
check_command   = "dotnet --version"
install_command = "winget install --id Microsoft.DotNet.SDK.10 -e --source winget"
install_url     = "https://dotnet.microsoft.com/download"
guidance        = "Download and run the .NET SDK installer."
required        = false

[[prerequisites]]
name            = "go"
display_name    = "Go"
description     = "A fast programming language from Google — used by some internal tools."
check_command   = "go version"
install_command = "winget install --id GoLang.Go -e --source winget"
install_url     = "https://go.dev/dl/"
guidance        = "Download and run the installer, then restart your terminal."
required        = false

# ── VS Code Extensions ──────────────────────────────────────
# Extensions are installed automatically. Required ones are always
# installed; optional ones let the user choose.

# --- Core AI ---
[[extensions]]
id          = "github.copilot-chat"
name        = "GitHub Copilot Chat"
description = "Chat with AI about your code directly in the editor."
required    = true

# --- Core Python ---
[[extensions]]
id          = "ms-python.python"
name        = "Python"
description = "Python language support — IntelliSense, linting, and debugging."
required    = true

[[extensions]]
id          = "ms-python.debugpy"
name        = "Python Debugger"
description = "Step-by-step debugging for Python programs."
required    = true

[[extensions]]
id          = "ms-python.vscode-pylance"
name        = "Pylance"
description = "Fast, feature-rich Python language server for code navigation and type checking."
required    = true

[[extensions]]
id          = "charliermarsh.ruff"
name        = "Ruff"
description = "An extremely fast Python linter and formatter."
required    = true

# --- Jupyter / Notebooks ---
[[extensions]]
id          = "ms-toolsai.jupyter"
name        = "Jupyter"
description = "Run and edit Jupyter notebooks inside VS Code."
required    = true

[[extensions]]
id          = "ms-toolsai.jupyter-keymap"
name        = "Jupyter Keymap"
description = "Familiar Jupyter keyboard shortcuts in VS Code."
required    = false

[[extensions]]
id          = "ms-toolsai.jupyter-renderers"
name        = "Jupyter Renderers"
description = "Rich output rendering for Jupyter notebooks (charts, tables, etc.)."
required    = false

# --- Azure & Data ---
[[extensions]]
id          = "ms-azuretools.vscode-azure-mcp-server"
name        = "Azure MCP Server"
description = "Connects Copilot to Azure resources for cloud-aware AI assistance."
required    = true

[[extensions]]
id          = "ms-azuretools.vscode-azure-github-copilot"
name        = "Azure for GitHub Copilot"
description = "Azure-specific Copilot features — deploy, diagnose, and manage cloud resources."
required    = true

[[extensions]]
id          = "ms-azuretools.vscode-azureresourcegroups"
name        = "Azure Resources"
description = "Browse and manage your Azure resources directly from VS Code."
required    = false

[[extensions]]
id          = "donjayamanne.kusto"
name        = "Kusto (KQL)"
description = "Syntax highlighting and IntelliSense for Kusto Query Language."
required    = true

[[extensions]]
id          = "fabric.vscode-fabric-mcp-server"
name        = "Fabric MCP Server"
description = "Connects Copilot to Microsoft Fabric for data engineering and analytics."
required    = true

[[extensions]]
id          = "analysis-services.powerbi-modeling-mcp"
name        = "Power BI Modeling MCP"
description = "Connects Copilot to Power BI Desktop for semantic model editing."
required    = true

# --- GitHub ---
[[extensions]]
id          = "github.vscode-pull-request-github"
name        = "GitHub Pull Requests"
description = "Review and manage pull requests without leaving VS Code."
required    = false

[[extensions]]
id          = "github.vscode-github-actions"
name        = "GitHub Actions"
description = "View and manage GitHub Actions workflows from VS Code."
required    = false

# --- SQL & Data Viewers ---
[[extensions]]
id          = "ms-mssql.mssql"
name        = "SQL Server (mssql)"
description = "Connect to and query SQL Server databases."
required    = false

[[extensions]]
id          = "grapecity.gc-excelviewer"
name        = "Excel Viewer"
description = "Preview Excel and CSV files directly in VS Code."
required    = false

[[extensions]]
id          = "mechatroner.rainbow-csv"
name        = "Rainbow CSV"
description = "Color-codes CSV columns so they're easier to read."
required    = false

[[extensions]]
id          = "tomoki1207.pdf"
name        = "PDF Viewer"
description = "View PDF files directly in VS Code."
required    = false

# --- Formatting & Linting ---
[[extensions]]
id          = "esbenp.prettier-vscode"
name        = "Prettier"
description = "Automatically formats your code so it looks consistent."
required    = false

[[extensions]]
id          = "dbaeumer.vscode-eslint"
name        = "ESLint"
description = "JavaScript and TypeScript linter — catches common mistakes."
required    = false

[[extensions]]
id          = "davidanson.vscode-markdownlint"
name        = "markdownlint"
description = "Keeps your Markdown files clean and consistently formatted."
required    = false

# ── MCP Servers ──────────────────────────────────────────────
# Model Context Protocol servers extend what Copilot can access.
# Secret values are left empty — the wizard prompts each person
# for their own credentials at install time.

[[mcp_servers]]
name        = "azure-mcp"
command     = "npx"
args        = ["-y", "@azure/mcp@latest", "server", "start"]
description = "Gives Copilot access to Azure resources — storage, databases, VMs, and more."

[[mcp_servers]]
name        = "fabric-rti-mcp"
command     = "uvx"
args        = ["microsoft-fabric-rti-mcp"]
description = "Connects Copilot to Microsoft Fabric Real-Time Intelligence for Kusto/KQL queries and event streams."
[mcp_servers.env]
KUSTO_SERVICE_URI        = ""
KUSTO_SERVICE_DEFAULT_DB = ""
FABRIC_API_BASE_URL      = "https://api.fabric.microsoft.com/v1"

[[mcp_servers]]
name        = "dax-query-server"
command     = "uv"
args        = ["--directory", "", "run", "dax-query-server"]
description = "Run DAX queries against Power BI / Analysis Services semantic models from Copilot."
[mcp_servers.env]
DAX_QUERY_MCP_CONNECTIONS_DIR = ""

[[mcp_servers]]
name        = "revenue-mcp-server"
command     = ""
args        = []
description = "Connects Copilot to Salesforce and internal revenue data for account lookups and opportunity analysis."
[mcp_servers.env]
ODOMETER_URL       = ""
SALESFORCE_INSTANCE = ""

# ── Guided Setup Steps ──────────────────────────────────────
# These walk new users through first-time authentication with
# plain-language instructions. Steps that are already complete
# are skipped automatically.

[[setup_steps]]
name           = "azure-login"
description    = "Sign in to Azure"
step_type      = "guided"
command        = "az login"
verify_command = "az account show"
error_help     = "If the browser didn't open, copy the URL shown in the terminal and paste it into your browser."
guidance       = """
A browser window will open. Please:
  1. Sign in with your work Microsoft email
  2. Choose your organisation if prompted
  3. Come back here when the browser says you're signed in

This connects you to Azure so Copilot and other tools can access
cloud resources on your behalf.
"""

[[setup_steps]]
name           = "github-auth"
description    = "Sign in to GitHub"
step_type      = "guided"
command        = "gh auth login --web"
verify_command = "gh auth status"
error_help     = "If the browser didn't open, run 'gh auth login' manually and follow the prompts."
guidance       = """
A browser window will open. Please:
  1. Sign in with your GitHub account
  2. Authorise the GitHub CLI when prompted
  3. Come back here when the browser confirms you're signed in

This lets the GitHub CLI (and Copilot's GitHub MCP server) access
your repositories and pull requests.
"""
